<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="mobile-wb-app-capable" content="yes">

    <meta name="theme-color" content="#000000">

    <title>Battle</title>

    <link rel="stylesheet" href="battle.css">

</head>
<body>

    <!-- BACKGROUND -->
    <div class="bg"></div>


    <!-- TOP UI -->
    <div class="topUI">

        <!-- PLAYER HP -->
        <div class="hpBox">

            <h2 id="heroName">Hero</h2>

            <div class="hpBar">

                <div id="playerHp"></div>

            </div>

        </div>


        <!-- ENEMY HP -->
        <div class="hpBox enemyBox">

            <h2>GORD</h2>

            <div class="hpBar">

                <div id="enemyHp"></div>

            </div>

        </div>

    </div>


    <!-- GAME AREA -->
    <canvas id="game"></canvas>


    <!-- MOBILE CONTROL -->
    <div class="controls">


        <!-- MOVE -->
        <div class="moveBtns">

            <button id="leftBtn" class="control-btn">
                <img src="img/left.png">
            </button>

            <button id="jumpBtn" class="control-btn">
                <img src="img/jump.png">
            </button>

            <button id="rightBtn" class="control-btn">
                <img src="img/right.png">
            </button>

        </div>


        <!-- ATTACK -->
        <button id="attackBtn" class="control-btn">
            <img src="img/attack.png">
        </button>

    </div>


    <!-- BUTTON -->
    <button id="backBtn">

        ⬅ BACK

    </button>


    <script src="battle.js"></script>

</body>
</html>
